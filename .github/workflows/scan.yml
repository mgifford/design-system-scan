name: Design system scan

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Optional SCAN issue number to process"
        required: false
        default: ""
      url:
        description: "Seed URL to scan"
        required: false
        default: "https://designsystem.digital.gov/"
      system:
        description: "Design system definition"
        required: false
        default: "auto"
      crawl:
        description: "Crawl same-origin pages from the seed URL"
        required: false
        type: boolean
        default: true
      max_pages:
        description: "Maximum number of pages to scan"
        required: false
        default: "10"
  issues:
    types:
      - opened
      - reopened
  schedule:
    - cron: "17 13 * * 1"
    - cron: "17 13 * * 2-5"

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Run tests
        run: npm test

  scan:
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.event_name != 'issues' ||
      startsWith(github.event.issue.title, 'SCAN:')
    outputs:
      accepted_urls: ${{ steps.inputs.outputs.url_count }}
      scanned_urls: ${{ steps.scan_stats.outputs.scanned_urls }}
      rejected_urls: ${{ steps.scan_stats.outputs.rejected_urls }}
      detected_system: ${{ steps.scan_stats.outputs.detected_system }}
      detected_theme: ${{ steps.scan_stats.outputs.detected_theme }}
      fingerprinted_pages: ${{ steps.scan_stats.outputs.fingerprinted_pages }}
      component_types: ${{ steps.scan_stats.outputs.component_types }}
      full_component_types: ${{ steps.scan_stats.outputs.full_component_types }}
      partial_component_types: ${{ steps.scan_stats.outputs.partial_component_types }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Prepare output directory
        run: mkdir -p artifacts

      - name: Resolve scan inputs
        id: inputs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_ISSUE_NUMBER: ${{ github.event.inputs.issue_number }}
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_SYSTEM: ${{ github.event.inputs.system }}
          INPUT_CRAWL: ${{ github.event.inputs.crawl }}
          INPUT_MAX_PAGES: ${{ github.event.inputs.max_pages }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p artifacts

          collect_issue_urls() {
            local title="$1"
            local body="$2"
            printf '%s\n%s\n' "$title" "$body" \
              | grep -Eio 'https?://[^ )]+|([[:alnum:]-]+\.)+[[:alpha:]]{2,}(/[^\ )]*)?' \
              | sed 's/[)>.,;:]+$//' \
              | while IFS= read -r raw_url; do
                  case "$raw_url" in
                    http://*|https://*)
                      printf '%s\n' "$raw_url"
                      ;;
                    *)
                      printf 'https://%s\n' "$raw_url"
                      ;;
                  esac
                done \
              | awk '!seen[$0]++'
          }

          if [ "$EVENT_NAME" = "schedule" ] && [ "$EVENT_SCHEDULE" = "17 13 * * 1" ]; then
            echo "url=https://designsystem.digital.gov/" >> "$GITHUB_OUTPUT"
            echo "system=auto" >> "$GITHUB_OUTPUT"
            echo "crawl=true" >> "$GITHUB_OUTPUT"
            echo "max_pages=20" >> "$GITHUB_OUTPUT"
            echo "trigger=weekly" >> "$GITHUB_OUTPUT"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
            echo "url_count=1" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            echo "url=https://designsystem.digital.gov/" >> "$GITHUB_OUTPUT"
            echo "system=auto" >> "$GITHUB_OUTPUT"
            echo "crawl=true" >> "$GITHUB_OUTPUT"
            echo "max_pages=10" >> "$GITHUB_OUTPUT"
            echo "trigger=weekday" >> "$GITHUB_OUTPUT"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
            echo "url_count=1" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "issues" ]; then
            collect_issue_urls "$ISSUE_TITLE" "$ISSUE_BODY" > artifacts/scan-urls.txt
            URL=$(head -n 1 artifacts/scan-urls.txt || true)
            SYSTEM=$(printf '%s\n' "$ISSUE_BODY" | sed -n 's/^system:[[:space:]]*//p' | head -n 1)
            CRAWL=$(printf '%s\n' "$ISSUE_BODY" | sed -n 's/^crawl:[[:space:]]*//p' | head -n 1)
            MAX_PAGES=$(printf '%s\n' "$ISSUE_BODY" | awk 'BEGIN{IGNORECASE=1} /^(max_pages|pages|number):[[:space:]]*/ { sub(/^[^:]+:[[:space:]]*/, "", $0); print; exit }')

            if [ -z "$URL" ]; then
              echo "No URL found in issue title/body. Use a SCAN: issue with a URL or bare domain in the title or body." >&2
              exit 1
            fi

            if [ -z "$SYSTEM" ]; then
              SYSTEM="auto"
            fi

            if [ -z "$CRAWL" ]; then
              CRAWL="true"
            fi

            if [ -z "$MAX_PAGES" ]; then
              MAX_PAGES="10"
            fi

            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "system=$SYSTEM" >> "$GITHUB_OUTPUT"
            echo "crawl=$CRAWL" >> "$GITHUB_OUTPUT"
            echo "max_pages=$MAX_PAGES" >> "$GITHUB_OUTPUT"
            echo "trigger=issue-${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "url_count=$(wc -l < artifacts/scan-urls.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_ISSUE_NUMBER" ]; then
            ISSUE_JSON=$(curl -fsSL \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPOSITORY/issues/$INPUT_ISSUE_NUMBER")
            ISSUE_TITLE=$(printf '%s' "$ISSUE_JSON" | node -e 'let data=""; process.stdin.on("data", c => data += c); process.stdin.on("end", () => { const issue = JSON.parse(data); process.stdout.write(issue.title || ""); });')
            ISSUE_BODY=$(printf '%s' "$ISSUE_JSON" | node -e 'let data=""; process.stdin.on("data", c => data += c); process.stdin.on("end", () => { const issue = JSON.parse(data); process.stdout.write(issue.body || ""); });')
            collect_issue_urls "$ISSUE_TITLE" "$ISSUE_BODY" > artifacts/scan-urls.txt
            URL=$(head -n 1 artifacts/scan-urls.txt || true)
            SYSTEM=$(printf '%s\n' "$ISSUE_BODY" | sed -n 's/^system:[[:space:]]*//p' | head -n 1)
            CRAWL=$(printf '%s\n' "$ISSUE_BODY" | sed -n 's/^crawl:[[:space:]]*//p' | head -n 1)
            MAX_PAGES=$(printf '%s\n' "$ISSUE_BODY" | awk 'BEGIN{IGNORECASE=1} /^(max_pages|pages|number):[[:space:]]*/ { sub(/^[^:]+:[[:space:]]*/, "", $0); print; exit }')

            if [ -z "$URL" ]; then
              echo "No URL found in issue title/body for issue #$INPUT_ISSUE_NUMBER." >&2
              exit 1
            fi

            if [ -z "$SYSTEM" ]; then
              SYSTEM="auto"
            fi

            if [ -z "$CRAWL" ]; then
              CRAWL="true"
            fi

            if [ -z "$MAX_PAGES" ]; then
              MAX_PAGES="10"
            fi

            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "system=$SYSTEM" >> "$GITHUB_OUTPUT"
            echo "crawl=$CRAWL" >> "$GITHUB_OUTPUT"
            echo "max_pages=$MAX_PAGES" >> "$GITHUB_OUTPUT"
            echo "trigger=issue-$INPUT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "issue_number=$INPUT_ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "url_count=$(wc -l < artifacts/scan-urls.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          else
            echo "url=${INPUT_URL}" >> "$GITHUB_OUTPUT"
            echo "system=${INPUT_SYSTEM}" >> "$GITHUB_OUTPUT"
            echo "crawl=${INPUT_CRAWL}" >> "$GITHUB_OUTPUT"
            echo "max_pages=${INPUT_MAX_PAGES}" >> "$GITHUB_OUTPUT"
            echo "trigger=manual" >> "$GITHUB_OUTPUT"
            echo "issue_number=" >> "$GITHUB_OUTPUT"
            echo "url_count=1" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner
        env:
          ISSUE_NUMBER: ${{ steps.inputs.outputs.issue_number }}
          SCAN_URL: ${{ steps.inputs.outputs.url }}
          SCAN_SYSTEM: ${{ steps.inputs.outputs.system }}
          SCAN_CRAWL: ${{ steps.inputs.outputs.crawl }}
          SCAN_MAX_PAGES: ${{ steps.inputs.outputs.max_pages }}
        run: |
          set -eu
          CRAWL_ARGS=""
          if [ "$SCAN_CRAWL" = "true" ]; then
            CRAWL_ARGS="--crawl --max-pages $SCAN_MAX_PAGES"
          fi

          if [ -n "$ISSUE_NUMBER" ] && [ -s artifacts/scan-urls.txt ]; then
            node src/cli.js \
              --system "$SCAN_SYSTEM" \
              $CRAWL_ARGS \
              --save artifacts/scan.json \
              --file artifacts/scan-urls.txt | tee artifacts/report.txt
          else
            node src/cli.js \
              --system "$SCAN_SYSTEM" \
              $CRAWL_ARGS \
              --save artifacts/scan.json \
              "$SCAN_URL" | tee artifacts/report.txt
          fi

      - name: Save trigger metadata
        run: |
          {
            echo "trigger=${{ steps.inputs.outputs.trigger }}"
            echo "url=${{ steps.inputs.outputs.url }}"
            echo "system=${{ steps.inputs.outputs.system }}"
            echo "crawl=${{ steps.inputs.outputs.crawl }}"
            echo "max_pages=${{ steps.inputs.outputs.max_pages }}"
            echo "issue_number=${{ steps.inputs.outputs.issue_number }}"
            echo "url_count=${{ steps.inputs.outputs.url_count }}"
            echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > artifacts/metadata.txt

      - name: Extract scan stats
        id: scan_stats
        run: |
          node --input-type=module <<'EOF' >> "$GITHUB_OUTPUT"
          import fs from "node:fs";

          const report = JSON.parse(fs.readFileSync("artifacts/scan.json", "utf8"));
          const components = report.siteSummary?.components ?? [];
          const primaryTheme = report.siteSummary?.primaryTheme?.name ?? "";

          console.log(`scanned_urls=${report.siteSummary?.pageCount ?? 0}`);
          console.log("rejected_urls=0");
          console.log(`detected_system=${report.system?.name ?? ""}`);
          console.log(`detected_theme=${primaryTheme}`);
          console.log(`fingerprinted_pages=${report.siteSummary?.fingerprintedPageCount ?? 0}`);
          console.log(`component_types=${components.length}`);
          console.log(`full_component_types=${components.filter((component) => (component.full ?? 0) > 0).length}`);
          console.log(`partial_component_types=${components.filter((component) => (component.partial ?? 0) > 0).length}`);
          EOF

      - name: Fetch existing Pages history
        env:
          HISTORY_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/history.json
        run: |
          mkdir -p pages-input
          HTTP_CODE=$(curl -sSL -w "%{http_code}" "$HISTORY_URL" -o pages-input/history.json.tmp || true)
          if [ "$HTTP_CODE" = "200" ]; then
            mv pages-input/history.json.tmp pages-input/history.json
          else
            rm -f pages-input/history.json.tmp
            echo '{"version":1,"updatedAt":null,"scans":[]}' > pages-input/history.json
          fi

          {
            echo "history_url=$HISTORY_URL"
            echo "http_code=$HTTP_CODE"
            echo "history_bytes=$(wc -c < pages-input/history.json | tr -d ' ')"
          } | tee pages-input/history-fetch.txt

      - name: Build Pages archive
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          URL: ${{ steps.inputs.outputs.url }}
          SYSTEM: ${{ steps.inputs.outputs.system }}
          CRAWL: ${{ steps.inputs.outputs.crawl }}
          MAX_PAGES: ${{ steps.inputs.outputs.max_pages }}
          TRIGGER: ${{ steps.inputs.outputs.trigger }}
          ISSUE_NUMBER: ${{ steps.inputs.outputs.issue_number }}
          URL_COUNT: ${{ steps.inputs.outputs.url_count }}
        run: |
          mkdir -p site
          node --input-type=module <<'EOF'
            import fs from "node:fs/promises";
            import {
              createArchiveEntry,
              loadArchiveHistory,
              mergeArchiveHistory,
              writeArchiveSite,
            } from "./src/archive.js";
            import { writeDashboardSite } from "./src/dashboard.js";

            const reportText = await fs.readFile("artifacts/report.txt", "utf8");
            const report = JSON.parse(await fs.readFile("artifacts/scan.json", "utf8"));
            const history = await loadArchiveHistory("pages-input/history.json");
            const metadata = {
              reportText,
              repository: process.env.REPOSITORY,
              runId: process.env.RUN_ID,
              runNumber: process.env.RUN_NUMBER,
              sha: process.env.SHA,
              url: process.env.URL,
              system: process.env.SYSTEM,
              crawl: process.env.CRAWL,
              maxPages: process.env.MAX_PAGES,
              trigger: process.env.TRIGGER,
              issueNumber: process.env.ISSUE_NUMBER,
              urlCount: process.env.URL_COUNT,
              runUrl: `https://github.com/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`,
            };
            const entry = createArchiveEntry(report, metadata);
            const mergedHistory = mergeArchiveHistory(history, entry);

            await writeArchiveSite("site", mergedHistory);
            await fs.mkdir("site/latest", { recursive: true });
            await writeDashboardSite("site/latest", report, metadata);
            await fs.mkdir(`site/runs/${process.env.RUN_ID}`, { recursive: true });
            await writeDashboardSite(`site/runs/${process.env.RUN_ID}`, report, metadata);

            await fs.writeFile("site/report.txt", reportText, "utf8");
            await fs.writeFile("site/scan.json", JSON.stringify(report, null, 2), "utf8");
          EOF

      - name: Debug generated Pages output
        env:
          RUN_ID: ${{ github.run_id }}
          ISSUE_NUMBER: ${{ steps.inputs.outputs.issue_number }}
        run: |
          mkdir -p artifacts
          find site -type f | sort | tee artifacts/site-files.txt

          node --input-type=module <<'EOF' | tee artifacts/site-check.txt
          import fs from "node:fs";

          const runId = process.env.RUN_ID;
          const issueNumber = process.env.ISSUE_NUMBER;
          const expected = [
            "site/index.html",
            "site/history.json",
            "site/latest/index.html",
            `site/runs/${runId}/index.html`,
            "site/report.txt",
            "site/scan.json",
          ];

          if (issueNumber) {
            expected.push(
              `site/reports/issues/issue-${issueNumber}/run-${runId}/report.html`,
              `site/reports/issues/issue-${issueNumber}/run-${runId}/report.md`,
              `site/reports/issues/issue-${issueNumber}/run-${runId}/report.csv`,
              `site/reports/issues/issue-${issueNumber}/run-${runId}/report.json`
            );
          }

          for (const pathname of expected) {
            const exists = fs.existsSync(pathname);
            console.log(`${exists ? "OK" : "MISSING"} ${pathname}`);
          }
          EOF

      - name: Publish step summary
        run: |
          echo "Trigger: ${{ steps.inputs.outputs.trigger }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "History fetch:" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat pages-input/history-fetch.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Generated Pages files:" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/site-check.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/report.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v6
        with:
          name: design-system-scan-${{ steps.inputs.outputs.trigger }}-${{ github.run_number }}
          path: artifacts/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

  deploy-pages:
    runs-on: ubuntu-latest
    needs: scan
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  issue-followup:
    runs-on: ubuntu-latest
    needs:
      - scan
      - deploy-pages
    if: >
      (github.event_name == 'issues' && startsWith(github.event.issue.title, 'SCAN:')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number != '')
    steps:
      - name: Comment on issue with report links
        uses: actions/github-script@v8
        env:
          PAGE_URL: ${{ needs.deploy-pages.outputs.page_url }}
          DETECTED_SYSTEM: ${{ needs.scan.outputs.detected_system }}
          DETECTED_THEME: ${{ needs.scan.outputs.detected_theme }}
          ACCEPTED_URLS: ${{ needs.scan.outputs.accepted_urls }}
          SCANNED_URLS: ${{ needs.scan.outputs.scanned_urls }}
          REJECTED_URLS: ${{ needs.scan.outputs.rejected_urls }}
          FINGERPRINTED_PAGES: ${{ needs.scan.outputs.fingerprinted_pages }}
          COMPONENT_TYPES: ${{ needs.scan.outputs.component_types }}
          FULL_COMPONENT_TYPES: ${{ needs.scan.outputs.full_component_types }}
          PARTIAL_COMPONENT_TYPES: ${{ needs.scan.outputs.partial_component_types }}
        with:
          script: |
            const issueNumber = context.payload.issue?.number || Number(context.payload.inputs.issue_number);
            const issueTitle = context.payload.issue?.title || `SCAN issue #${issueNumber}`;
            const scanLabel = issueTitle.replace(/^SCAN:\s*/i, "").replace(/\/$/, "");
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pageUrl = process.env.PAGE_URL || 'GitHub Pages deployment pending';
            const pageBase = typeof pageUrl === 'string' && pageUrl.startsWith('http')
              ? pageUrl.replace(/\/?$/, '/')
              : null;
            const archiveEntryUrl = pageBase ? `${pageBase}#scan-${context.runId}` : 'GitHub Pages deployment pending';
            const reportBase = pageBase
              ? `${pageBase}reports/issues/issue-${issueNumber}/run-${context.runId}/`
              : null;
            const reportHtmlUrl = reportBase ? `${reportBase}report.html` : 'GitHub Pages deployment pending';
            const reportMarkdownUrl = reportBase ? `${reportBase}report.md` : 'GitHub Pages deployment pending';
            const reportCsvUrl = reportBase ? `${reportBase}report.csv` : 'GitHub Pages deployment pending';
            const reportJsonUrl = reportBase ? `${reportBase}report.json` : 'GitHub Pages deployment pending';
            const latestUrl = pageBase ? `${pageBase}latest/` : 'GitHub Pages deployment pending';
            const artifactsUrl = `${runUrl}#artifacts`;
            const bodyLines = [
              `Scan complete for ${scanLabel}.`,
              ``,
              `- Detected design system: ${process.env.DETECTED_SYSTEM}`,
              `- Report (Pages): ${reportHtmlUrl}`,
              `- Markdown (Pages): ${reportMarkdownUrl}`,
              `- CSV (Pages): ${reportCsvUrl}`,
              `- JSON (Pages): ${reportJsonUrl}`,
              `- Archive entry: ${archiveEntryUrl}`,
              `- Workflow run: ${runUrl}`,
              `- Artifacts: ${artifactsUrl}`,
              `- Latest published dashboard: ${latestUrl}`,
              ``,
              `Suggested review path:`,
              `1. Open the Pages report for the stable, run-specific report output.`,
              `2. Use the archive entry to compare this run with other scans.`,
              `3. Open the workflow run if you need logs or downloadable artifacts.`
            ];

            if (process.env.DETECTED_THEME) {
              bodyLines.splice(3, 0, `- Detected theme: ${process.env.DETECTED_THEME}`);
            }

            bodyLines.splice(
              process.env.DETECTED_THEME ? 4 : 3,
              0,
              `- Accepted URLs: ${process.env.ACCEPTED_URLS}`,
              `- Scanned pages: ${process.env.SCANNED_URLS}`,
              `- Rejected URLs: ${process.env.REJECTED_URLS}`,
              `- Pages with design system fingerprint: ${process.env.FINGERPRINTED_PAGES}`,
              `- Components identified: ${process.env.COMPONENT_TYPES} distinct types (${process.env.FULL_COMPONENT_TYPES} with full matches, ${process.env.PARTIAL_COMPONENT_TYPES} with partial matches)`
            );

            const body = bodyLines.join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

      - name: Close issue after successful scan
        uses: actions/github-script@v8
        with:
          script: |
            const issueNumber = context.payload.issue?.number || Number(context.payload.inputs.issue_number);
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: 'closed',
            });
