name: Design system scan

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Seed URL to scan"
        required: false
        default: "https://designsystem.digital.gov/"
      system:
        description: "Design system definition"
        required: false
        default: "uswds"
      crawl:
        description: "Crawl same-origin pages from the seed URL"
        required: false
        type: boolean
        default: true
      max_pages:
        description: "Maximum number of pages to scan"
        required: false
        default: "10"
  issues:
    types:
      - opened
      - reopened
  schedule:
    - cron: "17 13 * * 1"
    - cron: "17 13 * * 2-5"

permissions:
  contents: read
  issues: write
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run tests
        run: npm test

  scan:
    runs-on: ubuntu-latest
    needs: test
    if: >
      github.event_name != 'issues' ||
      startsWith(github.event.issue.title, 'SCAN:')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Prepare output directory
        run: mkdir -p artifacts

      - name: Resolve scan inputs
        id: inputs
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_URL: ${{ github.event.inputs.url }}
          INPUT_SYSTEM: ${{ github.event.inputs.system }}
          INPUT_CRAWL: ${{ github.event.inputs.crawl }}
          INPUT_MAX_PAGES: ${{ github.event.inputs.max_pages }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          if [ "$EVENT_NAME" = "schedule" ] && [ "$EVENT_SCHEDULE" = "17 13 * * 1" ]; then
            echo "url=https://designsystem.digital.gov/" >> "$GITHUB_OUTPUT"
            echo "system=uswds" >> "$GITHUB_OUTPUT"
            echo "crawl=true" >> "$GITHUB_OUTPUT"
            echo "max_pages=20" >> "$GITHUB_OUTPUT"
            echo "trigger=weekly" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            echo "url=https://designsystem.digital.gov/" >> "$GITHUB_OUTPUT"
            echo "system=uswds" >> "$GITHUB_OUTPUT"
            echo "crawl=true" >> "$GITHUB_OUTPUT"
            echo "max_pages=10" >> "$GITHUB_OUTPUT"
            echo "trigger=weekday" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "issues" ]; then
            RAW_URL=$(printf '%s\n%s\n' "$ISSUE_TITLE" "$ISSUE_BODY" | grep -Eio 'https?://[^ )]+|([[:alnum:]-]+\.)+[[:alpha:]]{2,}(/[^\ )]*)?' | head -n 1 || true)
            SYSTEM=$(printf '%s\n' "$ISSUE_BODY" | sed -n 's/^system:[[:space:]]*//p' | head -n 1)
            CRAWL=$(printf '%s\n' "$ISSUE_BODY" | sed -n 's/^crawl:[[:space:]]*//p' | head -n 1)
            MAX_PAGES=$(printf '%s\n' "$ISSUE_BODY" | awk 'BEGIN{IGNORECASE=1} /^(max_pages|pages|number):[[:space:]]*/ { sub(/^[^:]+:[[:space:]]*/, "", $0); print; exit }')

            if [ -n "$RAW_URL" ]; then
              case "$RAW_URL" in
                http://*|https://*)
                  URL="$RAW_URL"
                  ;;
                *)
                  URL="https://$RAW_URL"
                  ;;
              esac
            else
              URL=""
            fi

            if [ -z "$URL" ]; then
              echo "No URL found in issue title/body. Use a SCAN: issue with a URL or bare domain in the title or body." >&2
              exit 1
            fi

            if [ -z "$SYSTEM" ]; then
              SYSTEM="uswds"
            fi

            if [ -z "$CRAWL" ]; then
              CRAWL="true"
            fi

            if [ -z "$MAX_PAGES" ]; then
              MAX_PAGES="10"
            fi

            echo "url=$URL" >> "$GITHUB_OUTPUT"
            echo "system=$SYSTEM" >> "$GITHUB_OUTPUT"
            echo "crawl=$CRAWL" >> "$GITHUB_OUTPUT"
            echo "max_pages=$MAX_PAGES" >> "$GITHUB_OUTPUT"
            echo "trigger=issue-${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "url=${INPUT_URL}" >> "$GITHUB_OUTPUT"
            echo "system=${INPUT_SYSTEM}" >> "$GITHUB_OUTPUT"
            echo "crawl=${INPUT_CRAWL}" >> "$GITHUB_OUTPUT"
            echo "max_pages=${INPUT_MAX_PAGES}" >> "$GITHUB_OUTPUT"
            echo "trigger=manual" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scanner
        env:
          SCAN_URL: ${{ steps.inputs.outputs.url }}
          SCAN_SYSTEM: ${{ steps.inputs.outputs.system }}
          SCAN_CRAWL: ${{ steps.inputs.outputs.crawl }}
          SCAN_MAX_PAGES: ${{ steps.inputs.outputs.max_pages }}
        run: |
          set -eu
          CRAWL_ARGS=""
          if [ "$SCAN_CRAWL" = "true" ]; then
            CRAWL_ARGS="--crawl --max-pages $SCAN_MAX_PAGES"
          fi

          node src/cli.js \
            --system "$SCAN_SYSTEM" \
            $CRAWL_ARGS \
            --save artifacts/scan.json \
            "$SCAN_URL" | tee artifacts/report.txt

      - name: Save trigger metadata
        run: |
          {
            echo "trigger=${{ steps.inputs.outputs.trigger }}"
            echo "url=${{ steps.inputs.outputs.url }}"
            echo "system=${{ steps.inputs.outputs.system }}"
            echo "crawl=${{ steps.inputs.outputs.crawl }}"
            echo "max_pages=${{ steps.inputs.outputs.max_pages }}"
            echo "run_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > artifacts/metadata.txt

      - name: Fetch existing Pages history
        env:
          HISTORY_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/history.json
        run: |
          mkdir -p pages-input
          curl -fsSL "$HISTORY_URL" -o pages-input/history.json || echo '{"version":1,"updatedAt":null,"scans":[]}' > pages-input/history.json

      - name: Build Pages archive
        env:
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          URL: ${{ steps.inputs.outputs.url }}
          SYSTEM: ${{ steps.inputs.outputs.system }}
          CRAWL: ${{ steps.inputs.outputs.crawl }}
          MAX_PAGES: ${{ steps.inputs.outputs.max_pages }}
          TRIGGER: ${{ steps.inputs.outputs.trigger }}
        run: |
          mkdir -p site
          node --input-type=module <<'EOF'
            import fs from "node:fs/promises";
            import {
              createArchiveEntry,
              loadArchiveHistory,
              mergeArchiveHistory,
              writeArchiveSite,
            } from "./src/archive.js";
            import { writeDashboardSite } from "./src/dashboard.js";

            const reportText = await fs.readFile("artifacts/report.txt", "utf8");
            const report = JSON.parse(await fs.readFile("artifacts/scan.json", "utf8"));
            const history = await loadArchiveHistory("pages-input/history.json");
            const metadata = {
              reportText,
              repository: process.env.REPOSITORY,
              runId: process.env.RUN_ID,
              runNumber: process.env.RUN_NUMBER,
              sha: process.env.SHA,
              url: process.env.URL,
              system: process.env.SYSTEM,
              crawl: process.env.CRAWL,
              maxPages: process.env.MAX_PAGES,
              trigger: process.env.TRIGGER,
              runUrl: `https://github.com/${process.env.REPOSITORY}/actions/runs/${process.env.RUN_ID}`,
            };
            const entry = createArchiveEntry(report, metadata);
            const mergedHistory = mergeArchiveHistory(history, entry);

            await writeArchiveSite("site", mergedHistory);
            await fs.mkdir("site/latest", { recursive: true });
            await writeDashboardSite("site/latest", report, metadata);
            await fs.mkdir(`site/runs/${process.env.RUN_ID}`, { recursive: true });
            await writeDashboardSite(`site/runs/${process.env.RUN_ID}`, report, metadata);

            await fs.writeFile("site/report.txt", reportText, "utf8");
            await fs.writeFile("site/scan.json", JSON.stringify(report, null, 2), "utf8");
          EOF

      - name: Publish step summary
        run: |
          echo "Trigger: ${{ steps.inputs.outputs.trigger }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat artifacts/report.txt >> "$GITHUB_STEP_SUMMARY"

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: design-system-scan-${{ steps.inputs.outputs.trigger }}-${{ github.run_number }}
          path: artifacts/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy-pages:
    runs-on: ubuntu-latest
    needs: scan
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  issue-followup:
    runs-on: ubuntu-latest
    needs:
      - scan
      - deploy-pages
    if: github.event_name == 'issues' && startsWith(github.event.issue.title, 'SCAN:')
    steps:
      - name: Comment on issue with report links
        uses: actions/github-script@v7
        env:
          PAGE_URL: ${{ needs.deploy-pages.outputs.page_url }}
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pageUrl = process.env.PAGE_URL || 'GitHub Pages deployment pending';
            const pageBase = typeof pageUrl === 'string' && pageUrl.startsWith('http')
              ? pageUrl.replace(/\/?$/, '/')
              : null;
            const archiveEntryUrl = pageBase ? `${pageBase}#scan-${context.runId}` : 'GitHub Pages deployment pending';
            const runDetailUrl = pageBase ? `${pageBase}runs/${context.runId}/` : 'GitHub Pages deployment pending';
            const latestUrl = pageBase ? `${pageBase}latest/` : 'GitHub Pages deployment pending';
            const artifactsUrl = `${runUrl}#artifacts`;
            const body = [
              `Scan completed successfully for ${context.payload.issue.title}.`,
              ``,
              `Review links:`,
              `- Run detail page: ${runDetailUrl}`,
              `- Archive entry: ${archiveEntryUrl}`,
              `- Workflow run: ${runUrl}`,
              `- Artifacts: ${artifactsUrl}`,
              `- Latest published dashboard: ${latestUrl}`,
              ``,
              `Suggested review path:`,
              `1. Open the run detail page for the exact scan output.`,
              `2. Use the archive entry to compare this run with other scans.`,
              `3. Open the workflow run if you need logs or downloadable artifacts.`
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

      - name: Close issue after successful scan
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
            });
