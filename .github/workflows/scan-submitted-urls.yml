name: Scan submitted URLs

on:
  workflow_dispatch:
    inputs:
      max_issues:
        description: "Maximum number of open SCAN issues to dispatch"
        required: false
        default: "10"
  schedule:
    - cron: "43 13 * * 1-5"

permissions:
  actions: write
  contents: read
  issues: read

jobs:
  dispatch-open-scan-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch scans for open SCAN issues
        uses: actions/github-script@v8
        env:
          MAX_ISSUES: ${{ github.event.inputs.max_issues || '10' }}
        with:
          script: |
            const maxIssues = Number.parseInt(process.env.MAX_ISSUES || "10", 10);
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100,
            });

            const scanIssues = issues
              .filter((issue) => !issue.pull_request && issue.title.startsWith("SCAN:"))
              .sort((left, right) => left.number - right.number)
              .slice(0, maxIssues);

            core.summary.addHeading("Queued SCAN issues");
            core.summary.addTable([
              [
                { data: "Open issues fetched", header: true },
                { data: "Open SCAN issues", header: true },
                { data: "Dispatch limit", header: true },
              ],
              [String(issues.length), String(issues.filter((issue) => !issue.pull_request && issue.title.startsWith("SCAN:")).length), String(maxIssues)],
            ]);

            if (scanIssues.length === 0) {
              core.summary.addRaw("No open SCAN issues found.");
              await core.summary.write();
              return;
            }

            for (const issue of scanIssues) {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: "scan.yml",
                ref: context.ref.replace("refs/heads/", ""),
                inputs: {
                  issue_number: String(issue.number),
                  url: "",
                  system: "auto",
                  crawl: "true",
                  max_pages: "10",
                },
              });

              core.summary.addList([
                `Dispatched issue #${issue.number}: ${issue.title}`,
              ]);
            }

            const skippedIssues = issues
              .filter((issue) => !issue.pull_request && issue.title.startsWith("SCAN:"))
              .sort((left, right) => left.number - right.number)
              .slice(maxIssues)
              .map((issue) => `Skipped this run due to max_issues limit: #${issue.number} ${issue.title}`);

            if (skippedIssues.length > 0) {
              core.summary.addHeading("Skipped SCAN issues");
              core.summary.addList(skippedIssues);
            }

            await core.summary.write();
